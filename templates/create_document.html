<!DOCTYPE html>
<html>
<head>
    <title>Create {{ template.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main-content">

    <h2>Create {{ template.name }}</h2>

    <form method="POST" action="/submit_request">

        <input type="hidden" name="template_name" value="{{ template.name }}">

        <label>Title:</label>
        <input type="text" name="title" required>

        <label>Department:</label>
        <input type="text" name="department" required>

        <label>Date:</label>
        <input type="date" name="date" required>

        <label>Message:</label>
        <textarea name="message" rows="4" required></textarea>

        <label>Authority:</label>
        <input type="text" name="authority" required>

        <button class="btn">Submit Request</button>

    </form>

</div>

</body>
</html>
