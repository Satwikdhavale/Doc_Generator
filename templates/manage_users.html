<!DOCTYPE html>

<html>
<head>
    <title>Manage Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/logout">Logout</a>
</div>

<div class="main-content">

<h1>Manage Users</h1>

<table>

<tr>
<th>Username</th>
<th>Role</th>
<th>Status</th>
<th>Change Role</th>
<th>Reset Password</th>
<th>Activate / Deactivate</th>
<th>Delete</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.username }}</td>

<td>{{ user.role }}</td>

<td>
{% if user.active %}
Active
{% else %}
Disabled
{% endif %}
</td>

<td>
<form method="POST" action="{{ url_for('update_role', user_id=user.id) }}">
<select name="role">
<option value="student">Student</option>
<option value="faculty">Faculty</option>
<option value="hod">HOD</option>
<option value="dean">Dean</option>
<option value="admin">Admin</option>
</select>

<button type="submit" class="btn">Update</button>

</form>
</td>

<td>
<a href="/reset_password/{{ user.id }}" class="btn">Reset</a>
</td>

<td>
<a href="/toggle_user/{{ user.id }}" class="btn">Toggle</a>
</td>

<td>
<a href="/delete_user/{{ user.id }}" class="btn" style="background:red;">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
