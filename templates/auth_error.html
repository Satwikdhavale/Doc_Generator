<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card error-card">

        <h2>Login Failed</h2>

        <p class="error-message">
            {{ message }}
        </p>

        <a href="/" class="btn-primary">
            Try Again
        </a>

        <a href="/register" class="btn-secondary">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
